<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سيمو الاحترافي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap');
        :root { --gold: #d4af37; --black: #0a0a0a; --white: #ffffff; }
        
        body { background-color: var(--black); color: var(--white); font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .ascii-logo { color: var(--gold); font-family: monospace; white-space: pre; font-size: 10px; line-height: 1.2; display: inline-block; margin-top: 15px; }
        .store-title { font-family: 'Amiri', serif; color: var(--gold); font-size: 2.5rem; margin: 5px 0 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .gold-border { border: 2px solid var(--gold); border-radius: 12px; padding: 15px; margin-bottom: 20px; background: #111; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        input, textarea { background: #222; border: 1px solid #444; color: white; padding: 12px; width: 92%; margin: 8px 0; border-radius: 8px; font-family: 'Cairo'; }
        
        button { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 16px; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.01); }
        button:disabled { background: #555; cursor: wait; }

        .quick-preview { display: flex; overflow-x: auto; gap: 12px; padding: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .preview-item { min-width: 90px; border: 1px solid var(--gold); padding: 5px; background: #1a1a1a; border-radius: 8px; font-size: 10px; }
        .preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }

        .slider-container { width: 100%; height: 280px; position: relative; overflow: hidden; border-radius: 10px; margin: 10px 0; background: #000; border: 1px solid #333; }
        .slider-img { width: 100%; height: 100%; object-fit: contain; display: none; position: absolute; top: 0; left: 0; cursor: pointer; }
        .slider-img.active { display: block; animation: fade 0.8s ease-in-out; }
        @keyframes fade { from {opacity: 0.4} to {opacity: 1} }

        .account-card { border: 1px solid var(--gold); padding: 15px; background: #151515; text-align: right; border-radius: 15px; margin-bottom: 30px; }
        .badge { background: var(--gold); color: black; padding: 4px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .buy-btn { background: #25d366; color: white; display: block; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 15px; font-size: 18px; }
        
        #statusText { color: var(--gold); font-size: 14px; margin-bottom: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ascii-logo">
         _  _
        ( \/ )
     _   )  (   _
    ( \_/ /\ \_/ )
     \  _/_ \_  /
      \/ \/ \/ \/
        SIMO
    </div>
    <h1 class="store-title">متجر سيمو الاحترافي</h1>

    <div class="gold-border">
        <input type="text" id="searchId" placeholder="🔍 ابحث عن ID الحساب...">
        <button onclick="searchAcc()">بحث سريع</button>
    </div>

    <div id="quickPreview" class="quick-preview"></div>

    <div class="gold-border">
        <h3 style="color:var(--gold); margin-top:0;">نشر حساب (رفع تلقائي)</h3>
        <input type="text" id="accID" placeholder="ID الحساب">
        <input type="text" id="accRank" placeholder="المستوى / الرنك">
        <textarea id="desc" rows="3" placeholder="وصف الحساب..."></textarea>
        <input type="file" id="photos" accept="image/*" multiple>
        <input type="number" id="adminNum" placeholder="رقم المشرف">
        <input type="password" id="verifyPin" placeholder="الرمز السري (2026)">
        <div id="statusText">جاري المعالجة...</div>
        <button id="pubBtn" onclick="handlePublish()">نشر العرض الآن</button>
    </div>

    <hr style="border: 0.5px solid #333; margin: 30px 0;">
    <div id="mainDisplay">جاري التحميل...</div>

    <script>
        // الرابط الجديد بناءً على صورتك لـ Firebase
        const DB_URL = "https://simo-store-f0083-default-rtdb.firebaseio.com/accounts.json";
        const ADMINS = ["784137737", "7736314204", "784090897", "784724880"]; 
        const WHATSAPP = "967773614204"; 

        async function handlePublish() {
            const pin = document.getElementById('verifyPin').value;
            const num = document.getElementById('adminNum').value;
            const files = document.getElementById('photos').files;
            
            if(!ADMINS.includes(num) || pin !== "2026") return alert("بيانات المشرف غير صحيحة!"); 
            if(files.length === 0 || files.length > 5) return alert("اختر من 1 لـ 5 صور");

            const btn = document.getElementById('pubBtn');
            const status = document.getElementById('statusText');
            btn.disabled = true; status.style.display = "block";
            
            try {
                let uploadedUrls = [];
                for(let i=0; i < files.length; i++) {
                    status.innerText = `جاري الرفع (${i+1}/${files.length})...`;
                    let formData = new FormData();
                    formData.append("image", files[i]);

                    let res = await fetch("https://api.imgur.com/3/image", {
                        method: "POST",
                        headers: { Authorization: "Client-ID 546c25a59c58ad7" },
                        body: formData
                    });
                    let out = await res.json();
                    if(out.success) uploadedUrls.push(out.data.link);
                }

                await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        id: document.getElementById('accID').value,
                        rank: document.getElementById('accRank').value,
                        desc: document.getElementById('desc').value,
                        imgs: uploadedUrls,
                        admin: num,
                        date: Date.now()
                    })
                });

                alert("تم النشر بنجاح!");
                location.reload();
            } catch (e) {
                alert("خطأ في الرفع. تأكد من الإنترنت أو جرب VPN.");
                btn.disabled = false; status.style.display = "none";
            }
        }

        async function loadData() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const display = document.getElementById('mainDisplay');
                const preview = document.getElementById('quickPreview');
                display.innerHTML = ''; preview.innerHTML = '';
                if(!data) return display.innerHTML = "لا توجد عروض حالياً.";

                const list = Object.keys(data).map(key => data[key]).reverse();
                list.forEach((acc, index) => {
                    const imgs = acc.imgs || [];
                    preview.innerHTML += `<div class="preview-item"><img src="${imgs[0]}"><br>ID: ${acc.id}</div>`;

                    let imgsHtml = '';
                    imgs.forEach((url, i) => {
                        imgsHtml += `<img src="${url}" class="slider-img s-${index} ${i===0?'active':''}" onclick="window.open(this.src)">`;
                    });

                    display.innerHTML += `
                        <div class="account-card" id="card-${acc.id}">
                            <span class="badge">💎 ${acc.rank}</span>
                            <div class="slider-container">${imgsHtml}</div>
                            <h3>ID: ${acc.id}</h3>
                            <p style="white-space: pre-wrap; color:#ccc;">${acc.desc}</p>
                            <a class="buy-btn" href="https://wa.me/${WHATSAPP}?text=شراء الحساب ID:${acc.id}">💬 تواصل للشراء</a>
                        </div>`;
                    if(imgs.length > 1) startSlider(index);
                });
            } catch (e) { display.innerHTML = "خطأ في جلب البيانات."; }
        }

        function startSlider(idx) {
            let cur = 0;
            setInterval(() => {
                const slides = document.querySelectorAll(`.s-${idx}`);
                if(!slides.length) return;
                slides[cur].classList.remove('active');
                cur = (cur + 1) % slides.length;
                slides[cur].classList.add('active');
            }, 3000);
        }

        function searchAcc() {
            const sid = document.getElementById('searchId').value.trim();
            const el = document.getElementById(`card-${sid}`);
            if(el) el.scrollIntoView({behavior: "smooth", block: "center"});
            else alert("ID غير موجود.");
        }

        loadData();
    </script>
</body>
</html>
